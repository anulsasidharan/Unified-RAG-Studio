name: CI

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop
      - main

# Cancel any in-progress run for the same branch/PR when a new push arrives
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "18"
  PYTHON_VERSION: "3.11"

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1 · Frontend Lint + Type-check
  # ──────────────────────────────────────────────────────────────
  frontend-lint:
    name: "Frontend — ESLint + TypeScript"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        working-directory: ${{ github.workspace }}
        run: npm ci

      - name: Run ESLint
        run: npm run lint -- --max-warnings 0

      - name: Run TypeScript type-check
        run: npm run type-check

  # ──────────────────────────────────────────────────────────────
  # Job 2 · Frontend Unit Tests (Jest / Vitest)
  # ──────────────────────────────────────────────────────────────
  frontend-tests:
    name: "Frontend — Unit Tests"
    runs-on: ubuntu-latest
    needs: frontend-lint
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        working-directory: ${{ github.workspace }}
        run: npm ci

      - name: Run unit tests
        run: npm test -- --coverage --passWithNoTests

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: apps/web/coverage/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────
  # Job 3 · Backend Lint (Ruff)
  # ──────────────────────────────────────────────────────────────
  backend-lint:
    name: "Backend — Ruff + mypy"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: apps/api/requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run Ruff linter
        run: ruff check . --output-format=github

      - name: Run Ruff formatter check
        run: ruff format --check .

      - name: Run mypy type-check
        run: mypy app/ --ignore-missing-imports --no-error-summary
        continue-on-error: true   # mypy stubs may be incomplete early on; make non-blocking

  # ──────────────────────────────────────────────────────────────
  # Job 4 · Backend Unit Tests (pytest)
  # ──────────────────────────────────────────────────────────────
  backend-tests:
    name: "Backend — Unit Tests"
    runs-on: ubuntu-latest
    needs: backend-lint

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: apps/api

    env:
      DATABASE_URL: "sqlite+aiosqlite:///./test.db"   # In-memory-style SQLite for unit tests
      REDIS_URL: "redis://localhost:6379/0"
      QDRANT_URL: "http://localhost:6333"
      OPENAI_API_KEY: "sk-test-placeholder"
      ANTHROPIC_API_KEY: "sk-ant-test-placeholder"
      COHERE_API_KEY: "test-placeholder"
      SECRET_KEY: "ci-test-secret-key"
      APP_ENV: "test"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: apps/api/requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run pytest (unit tests only)
        run: |
          pytest tests/ \
            --ignore=tests/test_integration \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            -v \
            --tb=short \
            -x

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: apps/api/coverage.xml
          retention-days: 7

  # ──────────────────────────────────────────────────────────────
  # Summary gate — required status check for branch protection
  # ──────────────────────────────────────────────────────────────
  ci-success:
    name: "CI — All checks passed"
    runs-on: ubuntu-latest
    needs:
      - frontend-lint
      - frontend-tests
      - backend-lint
      - backend-tests
    if: always()
    steps:
      - name: Check all jobs succeeded
        run: |
          if [[ "${{ needs.frontend-lint.result }}" != "success" ||
                "${{ needs.frontend-tests.result }}" != "success" ||
                "${{ needs.backend-lint.result }}" != "success" ||
                "${{ needs.backend-tests.result }}" != "success" ]]; then
            echo "One or more CI jobs failed."
            exit 1
          fi
          echo "All CI checks passed."
