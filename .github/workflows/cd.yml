name: CD

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"   # Also trigger on semver tags (e.g. v1.0.0)

# Only one deploy runs at a time; newer pushes queue (not cancel) to avoid gaps
concurrency:
  group: cd-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1 · Build & Push — Web (Next.js)
  # ──────────────────────────────────────────────────────────────
  build-web:
    name: "Build & Push — Web"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/rag-studio-web
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: apps/web
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}

  # ──────────────────────────────────────────────────────────────
  # Job 2 · Build & Push — API (FastAPI + Celery worker)
  # ──────────────────────────────────────────────────────────────
  build-api:
    name: "Build & Push — API"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/rag-studio-api
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: apps/api
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

  # ──────────────────────────────────────────────────────────────
  # Job 3 · Create GitHub Release (on semver tags only)
  # ──────────────────────────────────────────────────────────────
  release:
    name: "Create GitHub Release"
    runs-on: ubuntu-latest
    needs: [build-web, build-api]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history for changelog generation

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Docker Images

            ```
            ghcr.io/${{ github.repository_owner }}/rag-studio-web:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/rag-studio-api:${{ github.ref_name }}
            ```

            ## Deploy
            ```bash
            IMAGE_TAG=${{ github.ref_name }} \
            docker compose -f docker/docker-compose.yml -f docker/docker-compose.prod.yml up -d
            ```

  # ──────────────────────────────────────────────────────────────
  # Job 4 · Deploy (placeholder — implement when infra is ready)
  # ──────────────────────────────────────────────────────────────
  deploy:
    name: "Deploy to Production"
    runs-on: ubuntu-latest
    needs: [build-web, build-api]
    environment: production   # Requires manual approval in GitHub Environments settings
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # TODO(P12-6): Replace this placeholder with real deployment steps.
      # Options:
      #   - SSH into server and run docker compose pull + up
      #   - kubectl set image for Kubernetes cluster
      #   - Trigger Argo CD / Flux sync
      #   - AWS ECS / GCP Cloud Run update

      - name: Deploy placeholder
        run: |
          echo "═══════════════════════════════════════════════"
          echo "  Deployment placeholder — P12-6 will implement"
          echo "═══════════════════════════════════════════════"
          echo "Web image:  ghcr.io/${{ github.repository_owner }}/rag-studio-web:sha-${{ github.sha }}"
          echo "API image:  ghcr.io/${{ github.repository_owner }}/rag-studio-api:sha-${{ github.sha }}"
          echo "Commit SHA: ${{ github.sha }}"
          echo "Actor:      ${{ github.actor }}"
          echo "Triggered:  ${{ github.event_name }}"

      - name: Post deployment summary
        run: |
          echo "### Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | production |" >> $GITHUB_STEP_SUMMARY
          echo "| Web Image | \`rag-studio-web:sha-${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| API Image | \`rag-studio-api:sha-${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ✅ Placeholder complete |" >> $GITHUB_STEP_SUMMARY
