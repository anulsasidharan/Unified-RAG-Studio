name: Tests (Integration + E2E)

on:
  # Manual trigger from the GitHub Actions UI
  workflow_dispatch:
    inputs:
      test-suite:
        description: "Which suite to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - integration
          - e2e

  # Automatic trigger on PRs (runs full suite)
  pull_request:
    branches:
      - develop
      - main
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "docker/**"
      - ".github/workflows/tests.yml"

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "18"
  PYTHON_VERSION: "3.11"

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1 · Backend Integration Tests
  # ──────────────────────────────────────────────────────────────
  integration-tests:
    name: "Integration Tests — Backend"
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' ||
      github.event.inputs.test-suite == 'all' ||
      github.event.inputs.test-suite == 'integration'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: raguser
          POSTGRES_PASSWORD: ragpass
          POSTGRES_DB: ragstudio_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U raguser -d ragstudio_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
        options: >-
          --health-cmd "bash -c 'echo > /dev/tcp/localhost/6333'"
          --health-interval 15s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 20s

    defaults:
      run:
        working-directory: apps/api

    env:
      DATABASE_URL: "postgresql+asyncpg://raguser:ragpass@localhost:5432/ragstudio_test"
      REDIS_URL: "redis://localhost:6379/0"
      CELERY_TASK_ALWAYS_EAGER: "true"
      QDRANT_URL: "http://localhost:6333"
      OPENAI_API_KEY: "sk-test-placeholder"
      ANTHROPIC_API_KEY: "sk-ant-test-placeholder"
      COHERE_API_KEY: "test-placeholder"
      SECRET_KEY: "ci-integration-test-secret"
      APP_ENV: "test"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: apps/api/requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run Alembic migrations
        env:
          PYTHONPATH: ${{ github.workspace }}/apps/api
        run: alembic upgrade head

      - name: Run integration tests
        run: |
          pytest tests/test_integration/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            -v \
            --tb=short \
            --timeout=120 \
            -x

      - name: Upload integration test coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-coverage
          path: apps/api/coverage.xml
          retention-days: 7

  # ──────────────────────────────────────────────────────────────
  # Job 2 · E2E Tests (Playwright)
  # ──────────────────────────────────────────────────────────────
  e2e-tests:
    name: "E2E Tests — Playwright"
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' ||
      github.event.inputs.test-suite == 'all' ||
      github.event.inputs.test-suite == 'e2e'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        working-directory: ${{ github.workspace }}
        run: npm ci

      - name: Install Playwright browsers
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Start services via Docker Compose
        env:
          OPENAI_API_KEY: "sk-test-placeholder"
          ANTHROPIC_API_KEY: "sk-ant-test-placeholder"
          SECRET_KEY: "ci-e2e-test-secret"
        run: |
          cp .env.example .env
          docker compose \
            -f docker/docker-compose.yml \
            -f docker/docker-compose.dev.yml \
            up -d db redis vector-db
          # Wait for services to be healthy
          sleep 20

      - name: Run backend (background)
        env:
          DATABASE_URL: "postgresql+asyncpg://raguser:ragpass@localhost:5432/ragstudio"
          REDIS_URL: "redis://localhost:6379/0"
          QDRANT_URL: "http://localhost:6333"
          OPENAI_API_KEY: "sk-test-placeholder"
          ANTHROPIC_API_KEY: "sk-ant-test-placeholder"
          SECRET_KEY: "ci-e2e-test-secret"
          APP_ENV: "test"
        run: |
          cd apps/api
          pip install -r requirements.txt
          alembic upgrade head
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          echo "API_PID=$!" >> $GITHUB_ENV
          # Wait for API to be ready
          npx wait-on http://localhost:8000/health --timeout 30000

      - name: Build and serve Next.js
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:8000"
        run: |
          cd apps/web
          npm run build
          npm start &
          echo "WEB_PID=$!" >> $GITHUB_ENV
          npx wait-on http://localhost:3000 --timeout 60000

      - name: Run Playwright E2E tests
        working-directory: apps/web
        env:
          PLAYWRIGHT_BASE_URL: "http://localhost:3000"
        run: npm run test:e2e -- --reporter=html

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 14

      - name: Stop services
        if: always()
        run: |
          docker compose \
            -f docker/docker-compose.yml \
            -f docker/docker-compose.dev.yml \
            down -v
          kill $API_PID $WEB_PID 2>/dev/null || true

  # ──────────────────────────────────────────────────────────────
  # Summary
  # ──────────────────────────────────────────────────────────────
  tests-summary:
    name: "Tests — All passed"
    runs-on: ubuntu-latest
    needs: [integration-tests, e2e-tests]
    if: always()
    steps:
      - name: Report result
        run: |
          integration="${{ needs.integration-tests.result }}"
          e2e="${{ needs.e2e-tests.result }}"

          echo "Integration: $integration"
          echo "E2E:         $e2e"

          if [[ "$integration" == "failure" || "$e2e" == "failure" ]]; then
            echo "One or more test suites failed."
            exit 1
          fi
          echo "All test suites passed (or were skipped)."
