# RAG Studio — Development Override
# Merges with docker-compose.yml (and docker-compose.build.yml if you build locally):
#   docker compose -f docker/docker-compose.yml -f docker/docker-compose.build.yml -f docker/docker-compose.dev.yml up --build -d
#
# Changes from base:
#   - Source code bind-mounted for hot-reload
#   - Debug ports exposed
#   - Dev environment flags set
#   - Reduced health-check intervals for faster startup feedback

name: rag-studio

services:

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      target: development
    command: npm run dev
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
    volumes:
      - ../apps/web:/app
      - /app/node_modules       # Anonymous volume so host node_modules don't overwrite container
      - /app/.next              # Preserve Next.js build cache inside container
      - ../data:/data           # Shared catalog JSON files (imported via ../../../../data/)
    ports:
      - "3000:3000"
      - "3001:3001"             # Next.js HMR websocket (some setups use this)
    healthcheck:
      start_period: 60s         # Next.js cold start is slower in dev

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
      target: development
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app
    environment:
      - APP_ENV=development
      - LOG_LEVEL=DEBUG
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    volumes:
      - ../apps/api:/app
      - ../data:/data             # Shared catalog JSON files (templates, pricing, etc.)
    ports:
      - "8000:8000"
      - "5678:5678"             # debugpy remote debugger port

  worker:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
      target: development
    command: celery -A app.worker:celery_app worker --loglevel=debug --concurrency=1
    environment:
      - APP_ENV=development
      - LOG_LEVEL=DEBUG
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    volumes:
      - ../apps/api:/app
      - ../data:/data             # Shared catalog JSON files

  db:
    ports:
      - "5432:5432"             # Expose for direct DB GUI access (TablePlus, DBeaver, etc.)
    environment:
      - POSTGRES_USER=raguser
      - POSTGRES_PASSWORD=ragpass
      - POSTGRES_DB=ragstudio

  redis:
    ports:
      - "6379:6379"             # Expose for RedisInsight or redis-cli on host

  vector-db:
    ports:
      - "6333:6333"             # REST API
      - "6334:6334"             # gRPC

  mlflow:
    ports:
      - "5000:5000"

  minio:
    ports:
      - "9000:9000"
      - "9001:9001"

  nginx:
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
