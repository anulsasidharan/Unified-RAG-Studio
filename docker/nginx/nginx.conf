worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─── Logging ───────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # ─── Performance ────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # ─── Gzip Compression ───────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ─── Upstream Definitions ───────────────────────────────
    upstream web_upstream {
        server web:3000;
        keepalive 32;
    }

    upstream api_upstream {
        server api:8000;
        keepalive 32;
    }

    # ─── Rate Limiting ──────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=build_limit:10m rate=5r/m;

    # ─── Main Server Block ──────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options        "SAMEORIGIN"   always;
        add_header X-Content-Type-Options "nosniff"      always;
        add_header X-XSS-Protection       "1; mode=block" always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

        client_max_body_size 100M;   # Allow large document uploads

        # ── Health check (nginx itself) ──────────────────────
        location = /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # ── API routes → FastAPI ─────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass         http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # Timeouts — Autopilot builds can be long-running
            proxy_read_timeout    300s;
            proxy_connect_timeout 10s;
            proxy_send_timeout    300s;
        }

        # ── Server-Sent Events (Autopilot build stream) ──────
        location /api/autopilot/build/ {
            proxy_pass         http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";

            # SSE-specific: disable buffering so events reach the client immediately
            proxy_buffering    off;
            proxy_cache        off;
            chunked_transfer_encoding on;
            proxy_read_timeout 3600s;   # Long-lived SSE connection

            add_header Cache-Control "no-cache";
            add_header Content-Type  "text/event-stream";
        }

        # ── Autopilot build rate limit ────────────────────────
        location = /api/autopilot/build {
            limit_req zone=build_limit burst=2 nodelay;
            proxy_pass http://api_upstream/api/autopilot/build;
        }

        # ── FastAPI docs (dev convenience) ───────────────────
        location ~ ^/(docs|redoc|openapi.json) {
            proxy_pass         http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # ── All other routes → Next.js ───────────────────────
        location / {
            proxy_pass         http://web_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";   # WebSocket for HMR in dev

            proxy_read_timeout 60s;
        }

        # ── Static asset caching ─────────────────────────────
        location /_next/static/ {
            proxy_pass       http://web_upstream;
            proxy_cache_valid 200 365d;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }
}
