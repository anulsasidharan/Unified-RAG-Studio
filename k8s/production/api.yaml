apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-studio-api
  namespace: rag-studio-prod
spec:
  replicas: 3
  selector:
    matchLabels:
      app: rag-studio-api
  template:
    metadata:
      labels:
        app: rag-studio-api
    spec:
      containers:
        - name: api
          image: ghcr.io/your-org/rag-studio-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: rag-studio-config
            - secretRef:
                name: rag-studio-secrets
          resources:
            requests:
              cpu: "300m"
              memory: "512Mi"
            limits:
              cpu: "1200m"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: rag-studio-api
  namespace: rag-studio-prod
spec:
  selector:
    app: rag-studio-api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
