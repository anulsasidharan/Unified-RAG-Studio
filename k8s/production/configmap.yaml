apiVersion: v1
kind: ConfigMap
metadata:
  name: rag-studio-config
  namespace: rag-studio-prod
data:
  APP_ENV: "production"
  LOG_LEVEL: "INFO"
  NEXT_PUBLIC_API_URL: "https://api.ragstudio.example.com"
  AUTH_REQUIRED: "true"
  AUTH_ACCESS_TOKEN_TTL_MINUTES: "60"
  AUTH_RATE_LIMIT_PER_MINUTE: "180"
