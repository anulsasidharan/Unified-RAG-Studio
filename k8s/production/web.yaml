apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-studio-web
  namespace: rag-studio-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rag-studio-web
  template:
    metadata:
      labels:
        app: rag-studio-web
    spec:
      containers:
        - name: web
          image: ghcr.io/your-org/rag-studio-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: rag-studio-config
          resources:
            requests:
              cpu: "250m"
              memory: "384Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: rag-studio-web
  namespace: rag-studio-prod
spec:
  selector:
    app: rag-studio-web
  ports:
    - name: http
      port: 80
      targetPort: 3000
