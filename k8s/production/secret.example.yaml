apiVersion: v1
kind: Secret
metadata:
  name: rag-studio-secrets
  namespace: rag-studio-prod
type: Opaque
stringData:
  SECRET_KEY: "replace-with-strong-secret"
  DATABASE_URL: "postgresql+asyncpg://raguser:ragpass@postgres:5432/ragstudio"
  REDIS_URL: "redis://redis:6379/0"
  QDRANT_URL: "http://qdrant:6333"
  OPENAI_API_KEY: "sk-..."
  ANTHROPIC_API_KEY: ""
  COHERE_API_KEY: ""
  GOOGLE_API_KEY: ""
  MISTRAL_API_KEY: ""
  MINIO_ENDPOINT: "http://minio:9000"
  MINIO_ACCESS_KEY: "minioadmin"
  MINIO_SECRET_KEY: "minioadmin"
  MINIO_BUCKET: "rag-studio-documents"
