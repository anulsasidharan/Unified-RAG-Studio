apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rag-studio-ingress
  namespace: rag-studio-prod
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - app.ragstudio.example.com
        - api.ragstudio.example.com
      secretName: rag-studio-tls
  rules:
    - host: app.ragstudio.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rag-studio-web
                port:
                  number: 80
    - host: api.ragstudio.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rag-studio-api
                port:
                  number: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rag-studio-api-hpa
  namespace: rag-studio-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rag-studio-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rag-studio-deny-by-default
  namespace: rag-studio-prod
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
  egress:
    - to:
        - namespaceSelector: {}
