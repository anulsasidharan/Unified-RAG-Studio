<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="55%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Ambient glows -->
  <circle cx="320" cy="280" r="280" fill="#4f46e5" opacity="0.12" filter="url(#softglow)"/>
  <circle cx="1640" cy="820" r="320" fill="#7c3aed" opacity="0.10" filter="url(#softglow)"/>
  <circle cx="960" cy="540" r="200" fill="#818cf8" opacity="0.06" filter="url(#softglow)"/>

  <!-- Stars -->
  <circle cx="120" cy="80" r="1.2" fill="white" opacity="0.5"/>
  <circle cx="340" cy="160" r="0.8" fill="white" opacity="0.4"/>
  <circle cx="580" cy="55" r="1.5" fill="white" opacity="0.3"/>
  <circle cx="820" cy="110" r="1" fill="white" opacity="0.5"/>
  <circle cx="1100" cy="60" r="1.3" fill="white" opacity="0.4"/>
  <circle cx="1380" cy="140" r="0.9" fill="white" opacity="0.6"/>
  <circle cx="1620" cy="80" r="1.4" fill="white" opacity="0.3"/>
  <circle cx="1800" cy="200" r="1" fill="white" opacity="0.5"/>
  <circle cx="200" cy="900" r="1.2" fill="white" opacity="0.4"/>
  <circle cx="440" cy="980" r="0.8" fill="white" opacity="0.3"/>
  <circle cx="1500" cy="960" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="1760" cy="900" r="1" fill="white" opacity="0.4"/>
  <circle cx="60" cy="540" r="1.1" fill="white" opacity="0.3"/>
  <circle cx="1860" cy="480" r="0.9" fill="white" opacity="0.5"/>

  <!-- UI mockup: sidebar -->
  <rect x="160" y="200" width="220" height="680" rx="12" fill="white" opacity="0.05" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
  <!-- Stage items -->
  <rect x="178" y="230" width="184" height="32" rx="8" fill="#4f46e5" opacity="0.7"/>
  <rect x="178" y="270" width="184" height="32" rx="8" fill="white" opacity="0.05"/>
  <rect x="178" y="310" width="184" height="32" rx="8" fill="white" opacity="0.05"/>
  <rect x="178" y="350" width="184" height="32" rx="8" fill="white" opacity="0.05"/>
  <rect x="178" y="390" width="184" height="32" rx="8" fill="white" opacity="0.05"/>
  <rect x="178" y="430" width="184" height="32" rx="8" fill="white" opacity="0.05"/>
  <rect x="178" y="470" width="184" height="32" rx="8" fill="white" opacity="0.05"/>
  <rect x="178" y="510" width="184" height="32" rx="8" fill="white" opacity="0.05"/>
  <text x="270" y="252" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="white" font-weight="700">Cloud Provider</text>
  <text x="270" y="292" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Data Ingestion</text>
  <text x="270" y="332" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Chunking</text>
  <text x="270" y="372" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Embedding</text>
  <text x="270" y="412" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Vector Store</text>
  <text x="270" y="452" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Retrieval</text>
  <text x="270" y="492" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Generation</text>
  <text x="270" y="532" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Guardrails</text>

  <!-- UI mockup: main panel -->
  <rect x="420" y="200" width="720" height="680" rx="12" fill="white" opacity="0.04" stroke="white" stroke-opacity="0.08" stroke-width="1"/>
  <rect x="440" y="220" width="300" height="20" rx="4" fill="white" opacity="0.15"/>
  <rect x="440" y="252" width="200" height="12" rx="3" fill="white" opacity="0.07"/>
  <rect x="440" y="300" width="320" height="44" rx="8" fill="white" opacity="0.06"/>
  <rect x="440" y="356" width="320" height="44" rx="8" fill="white" opacity="0.06"/>
  <rect x="440" y="412" width="320" height="44" rx="8" fill="white" opacity="0.06"/>
  <rect x="440" y="490" width="160" height="30" rx="20" fill="#22c55e" opacity="0.25"/>
  <text x="520" y="511" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#22c55e" font-weight="700">✓ Pipeline valid</text>
  <rect x="624" y="490" width="140" height="30" rx="20" fill="#f59e0b" opacity="0.25"/>
  <text x="694" y="511" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#f59e0b" font-weight="700">~$0.004 / query</text>

  <!-- UI mockup: analytics panel -->
  <rect x="1180" y="200" width="580" height="300" rx="12" fill="white" opacity="0.04" stroke="white" stroke-opacity="0.08" stroke-width="1"/>
  <rect x="1200" y="220" width="180" height="14" rx="3" fill="white" opacity="0.12"/>
  <!-- Mini chart bars -->
  <rect x="1210" y="420" width="30" height="50" rx="4" fill="url(#brand)" opacity="0.6"/>
  <rect x="1250" y="390" width="30" height="80" rx="4" fill="url(#brand)" opacity="0.6"/>
  <rect x="1290" y="370" width="30" height="100" rx="4" fill="url(#brand)" opacity="0.7"/>
  <rect x="1330" y="350" width="30" height="120" rx="4" fill="url(#brand)" opacity="0.8"/>
  <rect x="1370" y="330" width="30" height="140" rx="4" fill="url(#brand)" opacity="0.9"/>
  <rect x="1410" y="340" width="30" height="130" rx="4" fill="url(#brand)" opacity="0.8"/>
  <rect x="1450" y="310" width="30" height="160" rx="4" fill="url(#brand)"/>
  <rect x="1490" y="290" width="30" height="180" rx="4" fill="url(#brand)"/>
  <rect x="1530" y="300" width="30" height="170" rx="4" fill="url(#brand)" opacity="0.9"/>
  <rect x="1570" y="280" width="30" height="190" rx="4" fill="url(#brand)"/>
  <rect x="1610" y="260" width="30" height="210" rx="4" fill="url(#brand)"/>
  <rect x="1650" y="240" width="30" height="230" rx="4" fill="url(#brand)"/>
  <rect x="1690" y="250" width="30" height="220" rx="4" fill="url(#brand)" opacity="0.9"/>
  <rect x="1730" y="220" width="30" height="250" rx="4" fill="url(#brand)"/>

  <!-- Center: Logo + Brand -->
  <rect x="880" y="320" width="64" height="64" rx="18" fill="url(#btnGrad)" filter="url(#glow)"/>
  <text x="912" y="362" text-anchor="middle" font-family="system-ui,sans-serif" font-size="32" fill="white">⚡</text>

  <text x="960" y="430" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="68" font-weight="800" fill="url(#brand)" letter-spacing="-2">Unified RAG Studio</text>
  <text x="960" y="492" text-anchor="middle" font-family="system-ui,sans-serif" font-size="26" fill="rgba(148,163,184,0.9)" font-weight="400">From cloud to guardrails — one guided pipeline.</text>

  <!-- Play button -->
  <circle cx="960" cy="600" r="52" fill="url(#btnGrad)" opacity="0.9" filter="url(#glow)"/>
  <circle cx="960" cy="600" r="52" fill="none" stroke="white" stroke-opacity="0.3" stroke-width="2"/>
  <polygon points="950,580 950,622 988,601" fill="white"/>

  <text x="960" y="680" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" fill="rgba(148,163,184,0.7)">Watch product tour · ~3 min</text>

  <!-- Chips -->
  <rect x="610" y="740" width="160" height="36" rx="18" fill="white" opacity="0.07" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <text x="690" y="764" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="rgba(199,210,254,0.9)" font-weight="600">17 Designer Stages</text>

  <rect x="790" y="740" width="140" height="36" rx="18" fill="white" opacity="0.07" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <text x="860" y="764" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="rgba(199,210,254,0.9)" font-weight="600">Autopilot Mode</text>

  <rect x="950" y="740" width="130" height="36" rx="18" fill="white" opacity="0.07" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <text x="1015" y="764" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="rgba(199,210,254,0.9)" font-weight="600">Guardrails</text>

  <rect x="1100" y="740" width="150" height="36" rx="18" fill="white" opacity="0.07" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <text x="1175" y="764" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="rgba(199,210,254,0.9)" font-weight="600">Multi-format Export</text>

  <rect x="1270" y="740" width="160" height="36" rx="18" fill="white" opacity="0.07" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <text x="1350" y="764" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="rgba(199,210,254,0.9)" font-weight="600">Production Ready</text>
